name: Hermes Research Papers 5AM

on:
  schedule:
    - cron: '30 23 * * *'
  workflow_dispatch:

jobs:
  research-papers:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Send Detailed Research Paper Summaries
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          OPENROUTER_KEY: ${{ secrets.OPENROUTER_KEY }}
        run: |
          pip install requests -q

          python3 << 'EOF'
          import requests
          import os
          import time
          from datetime import datetime

          TOKEN = os.environ["TELEGRAM_TOKEN"]
          CHAT_ID = os.environ["CHAT_ID"]
          OR_KEY = os.environ["OPENROUTER_KEY"]

          # Valid free models — tries each one until one works
          MODELS = [
              "meta-llama/llama-3.3-70b-instruct:free",
              "mistralai/mistral-7b-instruct:free",
              "google/gemma-3-27b-it:free",
          ]

          # ── Helpers ───────────────────────────────────────────────────────

          def send(text):
              chunks = [text[i:i+4000] for i in range(0, len(text), 4000)]
              for chunk in chunks:
                  try:
                      requests.post(
                          f"https://api.telegram.org/bot{TOKEN}/sendMessage",
                          json={"chat_id": CHAT_ID, "text": chunk},
                          timeout=15
                      )
                  except Exception as e:
                      print(f"Telegram error: {e}")
                  time.sleep(1)

          def ask_ai(prompt, system="You are a precise and detailed AI research analyst."):
              for model in MODELS:
                  for attempt in range(2):
                      try:
                          r = requests.post(
                              "https://openrouter.ai/api/v1/chat/completions",
                              headers={
                                  "Authorization": f"Bearer {OR_KEY}",
                                  "Content-Type": "application/json"
                              },
                              json={
                                  "model": model,
                                  "messages": [
                                      {"role": "system", "content": system},
                                      {"role": "user",   "content": prompt}
                                  ],
                                  "max_tokens": 2000
                              },
                              timeout=90
                          )
                          data = r.json()
                          if "choices" in data and data["choices"]:
                              print(f"  Model used: {model}")
                              return data["choices"][0]["message"]["content"]
                          else:
                              print(f"  Model {model} failed: {data.get('error', {}).get('message', 'unknown')}")
                              break  # try next model
                      except Exception as e:
                          print(f"  Attempt {attempt+1} error: {e}")
                          time.sleep(3)
              return None  # all models failed

          # ── Fetch from arXiv API ──────────────────────────────────────────

          def fetch_arxiv_api(category, count=5):
              papers = []
              try:
                  url = (
                      f"https://export.arxiv.org/api/query?"
                      f"search_query=cat:{category}"
                      f"&sortBy=submittedDate&sortOrder=descending"
                      f"&max_results={count}"
                  )
                  resp = requests.get(url, timeout=30, headers={"User-Agent": "HermesBot/1.0"})
                  content = resp.text
                  raw_entries = content.split("<entry>")[1:]

                  for entry in raw_entries[:count]:
                      title = ""
                      if "<title>" in entry:
                          title = entry.split("<title>")[1].split("</title>")[0].strip().replace("\n", " ")

                      abstract = ""
                      if "<summary>" in entry:
                          abstract = entry.split("<summary>")[1].split("</summary>")[0].strip().replace("\n", " ")

                      link = ""
                      if "<id>" in entry:
                          link = entry.split("<id>")[1].split("</id>")[0].strip()

                      author_list = []
                      for chunk in entry.split("<author>")[1:]:
                          if "<name>" in chunk:
                              name = chunk.split("<name>")[1].split("</name>")[0].strip()
                              author_list.append(name)
                      authors = ", ".join(author_list[:3])
                      if len(author_list) > 3:
                          authors += " et al."

                      published = ""
                      if "<published>" in entry:
                          published = entry.split("<published>")[1].split("</published>")[0].strip()[:10]

                      if title:
                          papers.append({
                              "title":     title,
                              "abstract":  abstract[:800],
                              "link":      link,
                              "authors":   authors,
                              "published": published
                          })
              except Exception as e:
                  print(f"arXiv error for {category}: {e}")
              return papers

          # ── Fetch all categories ──────────────────────────────────────────

          categories = {
              "AI (cs.AI)":               "cs.AI",
              "Machine Learning (cs.LG)": "cs.LG",
              "NLP (cs.CL)":              "cs.CL",
              "Computer Vision (cs.CV)":  "cs.CV",
              "Robotics (cs.RO)":         "cs.RO",
          }

          all_papers = []
          for cat_name, cat_code in categories.items():
              fetched = fetch_arxiv_api(cat_code, count=5)
              for p in fetched:
                  p["category"] = cat_name
              all_papers.extend(fetched)
              print(f"  {cat_name}: {len(fetched)} papers")
              time.sleep(2)

          print(f"Total: {len(all_papers)} papers")

          if len(all_papers) == 0:
              send("⚠️ arXiv returned 0 papers today. Will retry tomorrow at 5 AM.")
              exit()

          today = datetime.now().strftime("%d %B %Y")

          send(
              f"🌄 5:00 AM Research Brief — {today}\n\n"
              f"📚 Fetched {len(all_papers)} papers from arXiv\n"
              f"   (AI · ML · NLP · Computer Vision · Robotics)\n\n"
              f"🔍 Selecting top 5 most impactful papers...\n"
              f"Detailed breakdowns coming ☕"
          )

          # ── Step 1: AI selects top 5 ──────────────────────────────────────

          papers_list_text = ""
          for i, p in enumerate(all_papers):
              papers_list_text += (
                  f"[{i+1}] {p['category']}\n"
                  f"Title: {p['title']}\n"
                  f"Abstract: {p['abstract'][:250]}\n"
                  f"---\n"
              )

          selection_prompt = f"""From the arXiv papers below, select the TOP 5 that are most novel, impactful, and valuable for a student learning AI/ML.

Return ONLY a numbered list of their exact titles. Nothing else. No explanations.
Example format:
1. Exact Title Of Paper One
2. Exact Title Of Paper Two

PAPERS:
{papers_list_text[:5000]}"""

          print("Asking AI to select top 5...")
          top_5_raw = ask_ai(selection_prompt)

          # ── CRITICAL FIX: handle None response ───────────────────────────
          if not top_5_raw:
              send("⚠️ AI model unavailable for paper selection. Sending top 5 papers directly.")
              top_5_raw = ""
              # Fall through to fallback below

          print(f"Top 5 selected:\n{top_5_raw}")

          # ── Step 2: Detailed summary for each selected paper ──────────────

          summaries_sent = 0

          if top_5_raw:
              for i, paper in enumerate(all_papers):
                  if summaries_sent >= 5:
                      break

                  title_check = paper["title"][:45].lower()
                  if title_check not in top_5_raw.lower():
                      continue

                  summaries_sent += 1

                  detail_prompt = f"""Write a DETAILED summary of this research paper for a student who knows Python and ML basics. This summary should fully replace reading the paper.

Paper: {paper['title']}
Authors: {paper['authors']}
Date: {paper['published']}
Category: {paper['category']}
Abstract: {paper['abstract']}

Use EXACTLY this structure:

━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
📄 PAPER {summaries_sent} of 5
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
📌 {paper['title']}
👥 {paper['authors']}
🏷️ {paper['category']} | 📅 {paper['published']}

🎯 THE PROBLEM
[3 sentences: what problem, why it's hard, what gap it fills]

🛠️ THEIR APPROACH
[4 sentences: their method in plain English, what's new vs existing work]

📊 RESULTS & NUMBERS
[3 sentences: specific benchmarks, accuracy numbers, comparison to previous best]

🌍 REAL-WORLD IMPACT
[3 sentences: real use cases, who benefits, what this enables]

🎓 WHAT TO LEARN FROM THIS
[2 sentences: specific concept or technique worth studying, what to look up]

🔗 {paper['link']}"""

                  summary = ask_ai(detail_prompt)

                  if summary:
                      send(summary)
                  else:
                      # AI failed — send raw abstract as fallback
                      send(
                          f"📄 PAPER {summaries_sent} of 5\n\n"
                          f"📌 {paper['title']}\n"
                          f"👥 {paper['authors']}\n"
                          f"🏷️ {paper['category']} | 📅 {paper['published']}\n\n"
                          f"📝 Abstract:\n{paper['abstract']}\n\n"
                          f"🔗 {paper['link']}"
                      )

                  print(f"  Sent paper {summaries_sent}/5")
                  time.sleep(3)

          # ── Fallback: if AI selection matched nothing, send top 5 raw ─────

          if summaries_sent == 0:
              print("AI selection matched 0 papers — using fallback top 5")
              send("📋 Sending today's top 5 most recent papers:")
              for paper in all_papers[:5]:
                  summaries_sent += 1
                  detail_prompt = f"""Write a DETAILED summary of this research paper for a student who knows Python and ML basics.

Paper: {paper['title']}
Authors: {paper['authors']}
Date: {paper['published']}
Category: {paper['category']}
Abstract: {paper['abstract']}

Use EXACTLY this structure:

━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
📄 PAPER {summaries_sent} of 5
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
📌 {paper['title']}
👥 {paper['authors']}
🏷️ {paper['category']} | 📅 {paper['published']}

🎯 THE PROBLEM
[3 sentences]

🛠️ THEIR APPROACH
[4 sentences in plain English]

📊 RESULTS & NUMBERS
[3 sentences with specific numbers]

🌍 REAL-WORLD IMPACT
[3 sentences]

🎓 WHAT TO LEARN FROM THIS
[2 sentences]

🔗 {paper['link']}"""

                  summary = ask_ai(detail_prompt)
                  if summary:
                      send(summary)
                  else:
                      send(
                          f"📄 PAPER {summaries_sent} of 5\n\n"
                          f"📌 {paper['title']}\n"
                          f"👥 {paper['authors']}\n"
                          f"🏷️ {paper['category']} | 📅 {paper['published']}\n\n"
                          f"{paper['abstract']}\n\n"
                          f"🔗 {paper['link']}"
                      )
                  time.sleep(3)

          # ── Done ─────────────────────────────────────────────────────────

          send(
              f"✅ Research brief complete! ({summaries_sent} papers summarized)\n\n"
              f"📌 Pick ONE paper and skim the full PDF.\n"
              f"💬 Ask your Hermes bot to explain any concept anytime.\n\n"
              f"See you at 7 AM for AI/ML + Java news! 🚀"
          )

          print(f"✅ Done — {summaries_sent} summaries sent.")
          EOF
