name: Hermes Research Papers 6:30AM

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  research-papers:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install requests -q

      - name: Restore sent papers cache
        uses: actions/cache@v3
        with:
          path: sent_papers.txt
          key: sent-papers-${{ github.run_id }}
          restore-keys: |
            sent-papers-

      - name: Ensure cache file exists
        run: touch sent_papers.txt

      - name: Run Hermes Papers
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          OPENROUTER_KEY: ${{ secrets.OPENROUTER_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python papers.py

      - name: Save sent papers cache
        if: always()
        run: touch sent_papers.txt

      - name: Upload sent papers as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sent-papers
          path: sent_papers.txt
          retention-days: 90

      - name: Save cache
        uses: actions/cache/save@v3
        if: always()
        with:
          path: sent_papers.txt
          key: sent-papers-${{ github.run_id }}
