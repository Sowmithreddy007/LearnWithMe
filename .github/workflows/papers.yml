name: Hermes Research Papers 5 AM

on:
  schedule:
    - cron: '0 1 * * *' 
  workflow_dispatch:

jobs:
  research-papers:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Install dependencies
        run: pip install requests -q

      - name: Restore sent papers cache
        uses: actions/cache@v3
        with:
          path: sent_papers.txt
          key: sent-papers-${{ github.run_id }}
          restore-keys: |
            sent-papers-

      - name: Ensure cache file exists
        run: touch sent_papers.txt

      - name: Write Python script
        run: |
          cat > papers.py << 'PYEOF'
          import requests, os, time, smtplib
          from email.mime.multipart import MIMEMultipart
          from email.mime.text import MIMEText
          from datetime import datetime

          TOKEN      = os.environ["TELEGRAM_TOKEN"]
          CHAT_ID    = os.environ["CHAT_ID"]
          OR_KEY     = os.environ["OPENROUTER_KEY"]
          GMAIL_USER = os.environ["GMAIL_USER"]
          GMAIL_PASS = os.environ["GMAIL_APP_PASSWORD"]

          MODELS = [
              "nvidia/nemotron-3-super-120b-a12b:free",
              "meta-llama/llama-3.3-70b-instruct:free",
              "google/gemma-3-27b-it:free",
          ]

          # ── Sent papers tracker ───────────────────────────────────────────

          SENT_FILE = "sent_papers.txt"

          def load_sent():
              if os.path.exists(SENT_FILE):
                  with open(SENT_FILE, "r") as f:
                      return set(line.strip() for line in f if line.strip())
              return set()

          def save_sent(ids):
              existing = load_sent()
              all_ids = existing | ids
              trimmed = list(all_ids)[-200:]
              with open(SENT_FILE, "w") as f:
                  f.write("\n".join(trimmed))

          # ── Telegram ──────────────────────────────────────────────────────

          def send(text):
              chunks = [text[i:i+4000] for i in range(0, len(text), 4000)]
              for chunk in chunks:
                  try:
                      requests.post(
                          f"https://api.telegram.org/bot{TOKEN}/sendMessage",
                          json={"chat_id": CHAT_ID, "text": chunk},
                          timeout=15
                      )
                  except Exception as e:
                      print(f"Telegram error: {e}")
                  time.sleep(1)

          # ── AI ────────────────────────────────────────────────────────────

          def ask_ai(prompt, system="You are a patient teacher who explains complex research to complete beginners."):
              for model in MODELS:
                  for attempt in range(2):
                      try:
                          r = requests.post(
                              "https://openrouter.ai/api/v1/chat/completions",
                              headers={
                                  "Authorization": f"Bearer {OR_KEY}",
                                  "Content-Type": "application/json"
                              },
                              json={
                                  "model": model,
                                  "messages": [
                                      {"role": "system", "content": system},
                                      {"role": "user", "content": prompt}
                                  ],
                                  "max_tokens": 2000
                              },
                              timeout=90
                          )
                          data = r.json()
                          if "choices" in data and data["choices"]:
                              print(f"Model used: {model}")
                              return data["choices"][0]["message"]["content"]
                          else:
                              print(f"Model {model} failed: {data.get('error',{}).get('message','unknown')}")
                              break
                      except Exception as e:
                          print(f"Attempt {attempt+1} error: {e}")
                          time.sleep(3)
              return None

          # ── arXiv fetcher ─────────────────────────────────────────────────

          def fetch_arxiv(category, count=8):
              papers = []
              try:
                  url = (
                      f"https://export.arxiv.org/api/query?"
                      f"search_query=cat:{category}"
                      f"&sortBy=submittedDate&sortOrder=descending"
                      f"&max_results={count}"
                  )
                  resp = requests.get(url, timeout=30, headers={"User-Agent": "HermesBot/1.0"})
                  content = resp.text
                  raw_entries = content.split("<entry>")[1:]
                  for entry in raw_entries[:count]:
                      title = ""
                      if "<title>" in entry:
                          title = entry.split("<title>")[1].split("</title>")[0].strip().replace("\n", " ")
                      abstract = ""
                      if "<summary>" in entry:
                          abstract = entry.split("<summary>")[1].split("</summary>")[0].strip().replace("\n", " ")
                      link = ""
                      if "<id>" in entry:
                          link = entry.split("<id>")[1].split("</id>")[0].strip()
                      author_list = []
                      for chunk in entry.split("<author>")[1:]:
                          if "<name>" in chunk:
                              author_list.append(chunk.split("<name>")[1].split("</name>")[0].strip())
                      authors = ", ".join(author_list[:3])
                      if len(author_list) > 3:
                          authors += " et al."
                      published = ""
                      if "<published>" in entry:
                          published = entry.split("<published>")[1].split("</published>")[0].strip()[:10]
                      if title and link:
                          papers.append({
                              "title":     title,
                              "abstract":  abstract[:800],
                              "link":      link,
                              "authors":   authors,
                              "published": published
                          })
              except Exception as e:
                  print(f"arXiv error for {category}: {e}")
              return papers

          # ── Build summary prompt ──────────────────────────────────────────

          def build_summary_prompt(num, total, paper, is_weekly=False):
              label = "WEEKLY BEST" if is_weekly else "TODAY"
              return (
                  f"You are explaining a research paper to a complete beginner who just started "
                  f"learning about AI and ML. They are smart but have no technical background.\n\n"
                  f"Paper: {paper['title']}\n"
                  f"Authors: {paper['authors']}\n"
                  f"Date: {paper['published']}\n"
                  f"Category: {paper['category']}\n"
                  f"Abstract: {paper['abstract']}\n\n"
                  f"Write the summary in EXACTLY this structure. "
                  f"Do not skip any section. Do not use jargon without explaining it:\n\n"
                  f"PAPER {num} of {total} - {label}\n"
                  f"{paper['title']}\n"
                  f"Authors: {paper['authors']}\n"
                  f"Category: {paper['category']} | Date: {paper['published']}\n\n"
                  f"SIMPLE VERSION\n"
                  f"[Write 4-5 sentences in plain English that a 15-year-old could understand. "
                  f"No jargon. Explain what problem they solved and why it matters. "
                  f"Pretend you are explaining it to a friend who has never studied AI.]\n\n"
                  f"REAL-WORLD ANALOGY\n"
                  f"[Give ONE analogy comparing this research to something from everyday life. "
                  f"Example: 'This is like teaching a child to recognize cats by showing them "
                  f"10,000 pictures instead of just describing what a cat looks like.' "
                  f"Make it vivid and relatable.]\n\n"
                  f"WHAT THEY ACTUALLY DID\n"
                  f"THE PROBLEM\n"
                  f"[2-3 sentences: What specific gap or problem exists? "
                  f"Why has nobody solved it before? Keep it simple.]\n\n"
                  f"THEIR APPROACH\n"
                  f"[3-4 sentences: What technique or method did they use? "
                  f"If you must use a technical term, explain it in brackets immediately after. "
                  f"Example: 'They used a transformer (a type of AI that reads text in chunks) to...']\n\n"
                  f"RESULTS AND NUMBERS\n"
                  f"[2-3 sentences: What did they achieve? Include numbers if available. "
                  f"Explain what those numbers mean. Example: '95 percent accuracy means it gets "
                  f"it right 95 out of 100 times.']\n\n"
                  f"WHO BENEFITS FROM THIS\n"
                  f"[2-3 sentences: Name specific real people or industries this helps. "
                  f"Doctors? Students? Farmers? Self-driving car companies? Be concrete.]\n\n"
                  f"WHAT TO LEARN NEXT\n"
                  f"[List exactly 3 topics the student should Google and study to understand "
                  f"this paper better. Format as:\n"
                  f"1. [Topic name] - [one sentence on why this topic is relevant]\n"
                  f"2. [Topic name] - [one sentence]\n"
                  f"3. [Topic name] - [one sentence]]\n\n"
                  f"Full paper: {paper['link']}"
              )

          # ── HTML helpers ──────────────────────────────────────────────────

          def plain_to_html(text):
              if not text:
                  return "<p style='color:#999;font-family:Arial,sans-serif;'>Unavailable.</p>"
              lines = text.split("\n")
              parts = []
              for line in lines:
                  s = line.strip()
                  if not s:
                      parts.append("<div style='height:6px;'></div>")
                  elif s.startswith("- ") or s.startswith("* "):
                      parts.append(
                          "<div style='display:flex;align-items:flex-start;margin:6px 0;'>"
                          "<span style='color:#c9a227;margin-right:10px;font-size:16px;"
                          "line-height:1.4;'>&#8226;</span>"
                          "<span style='flex:1;color:#333;font-size:13px;"
                          "line-height:1.7;font-family:Georgia,serif;'>"
                          + s[2:] + "</span></div>"
                      )
                  elif s[:2] in ["1.", "2.", "3."] and len(s) > 4:
                      parts.append(
                          "<div style='display:flex;align-items:flex-start;margin:8px 0;'>"
                          "<span style='background:#1a1a2e;color:#c9a227;font-family:Arial;"
                          "font-size:11px;font-weight:bold;padding:2px 7px;"
                          "margin-right:10px;margin-top:2px;flex-shrink:0;'>"
                          + s[0] + "</span>"
                          "<span style='flex:1;color:#333;font-size:13px;"
                          "line-height:1.7;font-family:Georgia,serif;'>"
                          + s[3:] + "</span></div>"
                      )
                  elif s.isupper() and 2 < len(s) < 60:
                      parts.append(
                          "<p style='font-family:Arial,sans-serif;font-size:9px;"
                          "font-weight:bold;color:#1a1a2e;letter-spacing:2px;"
                          "margin:18px 0 6px;text-transform:uppercase;"
                          "border-bottom:1px solid #e8e4d9;padding-bottom:5px;'>"
                          + s + "</p>"
                      )
                  elif s.startswith("Full paper:"):
                      link = s.replace("Full paper:", "").strip()
                      parts.append(
                          "<p style='margin:14px 0 0;'>"
                          "<a href='" + link + "' style='display:inline-block;"
                          "background:#1a1a2e;color:#c9a227;font-family:Arial,sans-serif;"
                          "font-size:9px;font-weight:bold;letter-spacing:2px;"
                          "padding:7px 16px;text-decoration:none;text-transform:uppercase;'>"
                          "READ FULL PAPER &rarr;</a></p>"
                      )
                  else:
                      parts.append(
                          "<p style='margin:6px 0;line-height:1.8;color:#333;"
                          "font-size:13px;font-family:Georgia,serif;'>" + s + "</p>"
                      )
              return "\n".join(parts)

          def build_paper_card(num, total, paper, summary, is_weekly=False):
              badge = f"PAPER {num} OF {total}" + (" - WEEKLY BEST" if is_weekly else "")
              content = plain_to_html(summary) if summary else (
                  "<p style='font-family:Georgia,serif;font-size:13px;color:#333;'>"
                  + paper["abstract"] + "</p>"
              )
              return (
                  "<table role='presentation' width='100%' cellpadding='0'"
                  " cellspacing='0' style='margin:28px 0;"
                  "border:1px solid #e8e4d9;background:#fafaf8;'>"
                  "<tr>"
                  "<td style='background:#c9a227;width:4px;'></td>"
                  "<td style='padding:22px 26px;'>"
                  "<div style='margin-bottom:12px;'>"
                  "<span style='background:#1a1a2e;color:#c9a227;"
                  "font-family:Arial,sans-serif;font-size:8px;"
                  "font-weight:bold;letter-spacing:2px;padding:4px 12px;"
                  "text-transform:uppercase;'>" + badge + "</span>"
                  "</div>"
                  "<h2 style='color:#1a1a2e;font-size:17px;margin:0 0 8px;"
                  "font-family:Georgia,serif;line-height:1.5;'>"
                  + paper["title"] + "</h2>"
                  "<p style='color:#999;font-size:11px;margin:0 0 16px;"
                  "font-family:Arial,sans-serif;border-bottom:1px solid #e8e4d9;"
                  "padding-bottom:14px;'>"
                  + paper["authors"] + " &bull; "
                  + paper["category"] + " &bull; "
                  + paper["published"] + "</p>"
                  "<div>" + content + "</div>"
                  "</td></tr></table>"
              )

          def build_section_header(label, color):
              return (
                  "<table role='presentation' width='100%' cellpadding='0'"
                  " cellspacing='0' style='margin:28px 0 0;'><tr>"
                  "<td style='border-bottom:2px solid " + color + ";padding-bottom:8px;'>"
                  "<span style='background:" + color + ";color:#fff;"
                  "font-family:Arial,sans-serif;font-size:9px;letter-spacing:2px;"
                  "padding:5px 14px;text-transform:uppercase;font-weight:bold;'>"
                  + label + "</span>"
                  "</td></tr></table>"
              )

          def build_full_email(date, weekday, edition_label, intro_text, body_html):
              return (
                  "<!DOCTYPE html><html lang='en'>"
                  "<head><meta charset='UTF-8'>"
                  "<meta name='viewport' content='width=device-width,initial-scale=1'>"
                  "<title>The Hermes Daily</title></head>"
                  "<body style='margin:0;padding:0;background:#f0ede6;"
                  "font-family:Georgia,serif;'>"
                  "<table role='presentation' width='100%' cellpadding='0'"
                  " cellspacing='0' style='background:#f0ede6;'>"
                  "<tr><td align='center' style='padding:24px 12px;'>"
                  "<table role='presentation' style='max-width:680px;width:100%;"
                  "background:#fff;border:1px solid #d4c9b0;"
                  "box-shadow:0 2px 8px rgba(0,0,0,0.08);'>"
                  "<tr><td style='background:#1a1a2e;height:5px;'></td></tr>"
                  "<tr><td style='background:#c9a227;height:3px;'></td></tr>"
                  "<tr><td style='background:#1a1a2e;padding:32px 44px;text-align:center;'>"
                  "<p style='color:#c9a227;font-size:9px;letter-spacing:5px;"
                  "margin:0 0 10px;font-family:Arial,sans-serif;"
                  "text-transform:uppercase;font-weight:bold;'>"
                  "Your Personal Intelligence Brief</p>"
                  "<h1 style='color:#fff;font-size:44px;margin:0;letter-spacing:4px;"
                  "font-family:Georgia,serif;font-weight:normal;line-height:1;'>"
                  "THE HERMES DAILY</h1>"
                  "<p style='color:#c9a227;font-size:12px;margin:8px 0 0;"
                  "font-family:Arial,sans-serif;letter-spacing:2px;'>"
                  "RESEARCH EDITION</p>"
                  "<div style='border-top:1px solid #333;margin:14px 0 0;padding-top:12px;'>"
                  "<p style='color:#999;font-size:10px;margin:0;"
                  "font-family:Arial,sans-serif;letter-spacing:1px;'>"
                  + date + " &nbsp;&bull;&nbsp; " + edition_label +
                  " &nbsp;&bull;&nbsp; HERMES AI</p>"
                  "</div></td></tr>"
                  "<tr><td style='background:#c9a227;height:3px;'></td></tr>"
                  "<tr><td style='background:#1a1a2e;height:1px;'></td></tr>"
                  "<tr><td style='padding:24px 44px 0;background:#fff;'>"
                  "<table role='presentation' width='100%' cellpadding='0'"
                  " cellspacing='0' style='background:#f8f5ef;"
                  "border-left:4px solid #c9a227;'>"
                  "<tr><td style='padding:14px 18px;'>"
                  "<p style='color:#555;font-size:13px;margin:0;"
                  "font-family:Georgia,serif;line-height:1.6;'>"
                  + intro_text + "</p>"
                  "</td></tr></table></td></tr>"
                  "<tr><td style='padding:0 44px 44px;background:#fff;'>"
                  + body_html +
                  "</td></tr>"
                  "<tr><td style='background:#e8e4d9;height:1px;'></td></tr>"
                  "<tr><td style='background:#c9a227;height:3px;'></td></tr>"
                  "<tr><td style='background:#1a1a2e;padding:22px 44px;text-align:center;'>"
                  "<p style='color:#c9a227;font-size:11px;margin:0;"
                  "font-family:Arial,sans-serif;letter-spacing:3px;font-weight:bold;'>"
                  "THE HERMES DAILY - RESEARCH</p>"
                  "<p style='color:#666;font-size:10px;margin:8px 0 0;"
                  "font-family:Arial,sans-serif;'>"
                  "Papers from arXiv (cs.AI, cs.LG, cs.CL, cs.CV, cs.RO) "
                  "&bull; Summaries by OpenRouter AI"
                  "</p></td></tr>"
                  "<tr><td style='background:#c9a227;height:3px;'></td></tr>"
                  "</table></td></tr></table>"
                  "</body></html>"
              )

          def send_email(subject, html_body):
              try:
                  msg = MIMEMultipart("alternative")
                  msg["Subject"] = subject
                  msg["From"]    = f"Hermes Research <{GMAIL_USER}>"
                  msg["To"]      = GMAIL_USER
                  msg.attach(MIMEText(html_body, "html"))
                  with smtplib.SMTP("smtp.gmail.com", 587) as server:
                      server.ehlo()
                      server.starttls()
                      server.login(GMAIL_USER, GMAIL_PASS)
                      server.sendmail(GMAIL_USER, GMAIL_USER, msg.as_string())
                  print("Email sent!")
              except Exception as e:
                  print(f"Email error: {e}")

          # ── Categories ────────────────────────────────────────────────────

          categories = {
              "AI (cs.AI)":               "cs.AI",
              "Machine Learning (cs.LG)": "cs.LG",
              "NLP (cs.CL)":              "cs.CL",
              "Computer Vision (cs.CV)":  "cs.CV",
              "Robotics (cs.RO)":         "cs.RO",
          }

          today   = datetime.now().strftime("%d %B %Y")
          weekday = datetime.now().strftime("%A")

          # ═════════════════════════════════════════════════════════════════
          # WEEKEND PATH
          # ═════════════════════════════════════════════════════════════════

          if weekday in ["Saturday", "Sunday"]:

              send(
                  f"5:00 AM Weekend Research Digest - {today} ({weekday})\n\n"
                  f"arXiv is closed on weekends.\n"
                  f"Sending your full WEEK IN AI RESEARCH digest!\n\n"
                  f"Each paper has a simple explanation + real-world analogy + what to learn next.\n"
                  f"Full newsletter also coming to your email!"
              )

              weekly_papers = []
              for cat_name, cat_code in categories.items():
                  fetched = fetch_arxiv(cat_code, count=15)
                  for p in fetched:
                      p["category"] = cat_name
                  weekly_papers.extend(fetched)
                  time.sleep(2)

              print(f"Weekly papers: {len(weekly_papers)}")

              if len(weekly_papers) == 0:
                  send("Could not fetch weekly papers. arXiv may be down.")
                  exit()

              weekly_text = ""
              for i, p in enumerate(weekly_papers):
                  weekly_text += (
                      f"[{i+1}] {p['category']} | {p['published']}\n"
                      f"Title: {p['title']}\n"
                      f"Abstract: {p['abstract'][:300]}\n---\n"
                  )

              overview_prompt = (
                  f"You are summarizing a week of AI research for a complete beginner.\n\n"
                  f"Use plain English. No jargon. Write like you are texting a smart friend "
                  f"who has never studied AI.\n\n"
                  f"From these {len(weekly_papers)} papers write a WEEKLY OVERVIEW:\n\n"
                  "1. BIGGEST THEMES THIS WEEK\n"
                  "[What were researchers focused on? Explain each theme in 1-2 plain sentences.]\n\n"
                  "2. MOST EXCITING PAPER THIS WEEK\n"
                  "[Which one paper was most impressive and why? Explain it simply.]\n\n"
                  "3. ONE TREND TO WATCH\n"
                  "[Something new appearing across multiple papers. Why does it matter?]\n\n"
                  "4. ONE LINE PER AREA\n"
                  "[AI, ML, NLP, Computer Vision, Robotics - one plain English sentence each]\n\n"
                  f"PAPERS:\n{weekly_text[:5000]}"
              )

              overview = ask_ai(overview_prompt)
              if overview:
                  send(f"THIS WEEK IN AI RESEARCH\n{'='*35}\n\n{overview}")
              time.sleep(3)

              selection_prompt = (
                  "From these arXiv papers, select the TOP 5 most impactful ones this week.\n\n"
                  "Return ONLY a numbered list of exact titles. Nothing else.\n"
                  "Example:\n1. Title One\n2. Title Two\n\n"
                  f"PAPERS:\n{weekly_text[:5000]}"
              )
              top_5_raw = ask_ai(selection_prompt) or ""

              papers_to_summarize = []
              if top_5_raw:
                  for paper in weekly_papers:
                      if len(papers_to_summarize) >= 5:
                          break
                      if paper["title"][:45].lower() in top_5_raw.lower():
                          papers_to_summarize.append(paper)

              if len(papers_to_summarize) == 0:
                  papers_to_summarize = weekly_papers[:5]

              send(f"TOP 5 PAPERS OF THE WEEK\n{'='*35}\n\nDetailed summaries incoming...")

              email_body = build_section_header("THIS WEEK IN AI RESEARCH", "#1a1a2e")
              if overview:
                  email_body += (
                      "<div style='margin:16px 0;padding:16px 20px;"
                      "background:#f8f5ef;border-left:4px solid #1a1a2e;'>"
                      + plain_to_html(overview) + "</div>"
                  )
              email_body += build_section_header("TOP 5 PAPERS OF THE WEEK", "#c9a227")

              total = len(papers_to_summarize)
              for idx, paper in enumerate(papers_to_summarize):
                  num = idx + 1
                  prompt = build_summary_prompt(num, total, paper, is_weekly=True)
                  summary = ask_ai(prompt)
                  if summary:
                      send(summary)
                  else:
                      send(
                          f"PAPER {num}\n\n{paper['title']}\n\n"
                          f"{paper['abstract']}\n\n{paper['link']}"
                      )
                  email_body += build_paper_card(num, total, paper, summary, is_weekly=True)
                  print(f"Sent paper {num}/{total}")
                  time.sleep(3)

              html = build_full_email(
                  today, weekday,
                  f"{weekday} Weekend Research Digest",
                  f"arXiv does not publish on weekends. Here is your full week in AI research "
                  f"across {len(weekly_papers)} papers. Each summary includes a simple explanation, "
                  f"a real-world analogy, and what to learn next - perfect for beginners.",
                  email_body
              )
              send_email(f"The Hermes Daily - Week in AI Research ({today})", html)

              send(
                  f"Weekend digest complete!\n\n"
                  f"Full newsletter sent to your email.\n"
                  f"Enjoy your weekend! New papers Monday at 5 AM."
              )
              exit()

          # ═════════════════════════════════════════════════════════════════
          # WEEKDAY PATH
          # ═════════════════════════════════════════════════════════════════

          all_papers = []
          for cat_name, cat_code in categories.items():
              fetched = fetch_arxiv(cat_code, count=8)
              for p in fetched:
                  p["category"] = cat_name
              all_papers.extend(fetched)
              print(f"{cat_name}: {len(fetched)} papers")
              time.sleep(2)

          print(f"Total fetched: {len(all_papers)}")

          sent_ids   = load_sent()
          new_papers = [p for p in all_papers if p["link"] not in sent_ids]
          print(f"New papers: {len(new_papers)}")

          if len(new_papers) == 0:
              send(
                  f"5:00 AM Research Brief - {today}\n\n"
                  f"No new papers today.\n"
                  f"All recent papers already sent this week.\n"
                  f"Check back tomorrow!"
              )
              exit()

          send(
              f"5:00 AM Research Brief - {today} ({weekday})\n\n"
              f"Fetched {len(new_papers)} new papers from arXiv.\n"
              f"Each summary includes:\n"
              f"  Simple explanation\n"
              f"  Real-world analogy\n"
              f"  What to learn next\n\n"
              f"Full newsletter also coming to your email!"
          )

          papers_list_text = ""
          for i, p in enumerate(new_papers):
              papers_list_text += (
                  f"[{i+1}] {p['category']}\n"
                  f"Title: {p['title']}\n"
                  f"Abstract: {p['abstract'][:250]}\n---\n"
              )

          selection_prompt = (
              "From the arXiv papers below, select the TOP 5 most impactful and "
              "interesting for someone learning AI/ML.\n\n"
              "Return ONLY a numbered list of exact titles. Nothing else.\n"
              "Example:\n1. Title One\n2. Title Two\n\n"
              f"PAPERS:\n{papers_list_text[:5000]}"
          )

          print("Asking AI to select top 5...")
          top_5_raw = ask_ai(selection_prompt) or ""

          papers_to_summarize = []
          if top_5_raw:
              for paper in new_papers:
                  if len(papers_to_summarize) >= 5:
                      break
                  if paper["title"][:45].lower() in top_5_raw.lower():
                      papers_to_summarize.append(paper)

          if len(papers_to_summarize) == 0:
              print("AI selection matched nothing - using top 5 newest")
              papers_to_summarize = new_papers[:5]

          email_body = build_section_header("TODAY'S TOP 5 RESEARCH PAPERS", "#1a1a2e")
          sent_today = set()
          total = len(papers_to_summarize)

          for idx, paper in enumerate(papers_to_summarize):
              num = idx + 1
              prompt = build_summary_prompt(num, total, paper, is_weekly=False)
              summary = ask_ai(prompt)
              if summary:
                  send(summary)
              else:
                  send(
                      f"PAPER {num} of {total}\n\n"
                      f"{paper['title']}\n"
                      f"Authors: {paper['authors']}\n"
                      f"Category: {paper['category']} | {paper['published']}\n\n"
                      f"{paper['abstract']}\n\n"
                      f"Full paper: {paper['link']}"
                  )
              email_body += build_paper_card(num, total, paper, summary)
              sent_today.add(paper["link"])
              print(f"Sent paper {num}/{total}")
              time.sleep(3)

          save_sent(sent_today)

          html = build_full_email(
              today, weekday,
              f"{weekday} Research Edition",
              f"Today Hermes fetched {len(new_papers)} new papers from arXiv. "
              f"Each summary is written for beginners - simple explanation first, "
              f"real-world analogy, technical details, and what to study next.",
              email_body
          )
          send_email(f"The Hermes Daily - Research Brief ({today})", html)

          send(
              f"Research brief complete! ({total} papers)\n\n"
              f"Full newsletter sent to your email.\n"
              f"See you at 7 AM for news + challenges!"
          )

          print("Done!")
          PYEOF

      - name: Run Hermes Papers
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          OPENROUTER_KEY: ${{ secrets.OPENROUTER_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python papers.py

      - name: Save sent papers cache
        if: always()
        run: touch sent_papers.txt

      - name: Upload sent papers as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sent-papers
          path: sent_papers.txt
          retention-days: 90

      - name: Save cache
        uses: actions/cache/save@v3
        if: always()
        with:
          path: sent_papers.txt
          key: sent-papers-${{ github.run_id }}
