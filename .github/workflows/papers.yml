name: Hermes Research Papers 5AM

on:
  schedule:
    - cron: '30 23 * * *'   # 5:00 AM IST every day
  workflow_dispatch:

jobs:
  research-papers:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Send Detailed Research Paper Summaries
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          OPENROUTER_KEY: ${{ secrets.OPENROUTER_KEY }}
        run: |
          pip install requests feedparser -q

          python3 << 'EOF'
          import requests
          import os
          import time
          from datetime import datetime

          TOKEN = os.environ["TELEGRAM_TOKEN"]
          CHAT_ID = os.environ["CHAT_ID"]
          OR_KEY = os.environ["OPENROUTER_KEY"]

          # ── Send to Telegram ──────────────────────────────────────────────

          def send(text):
              chunks = [text[i:i+4000] for i in range(0, len(text), 4000)]
              for chunk in chunks:
                  try:
                      requests.post(
                          f"https://api.telegram.org/bot{TOKEN}/sendMessage",
                          json={"chat_id": CHAT_ID, "text": chunk},
                          timeout=15
                      )
                  except Exception as e:
                      print(f"Telegram send error: {e}")
                  time.sleep(1)

          # ── Ask AI ────────────────────────────────────────────────────────

          def ask_ai(prompt, system="You are a precise and detailed AI research analyst."):
              for attempt in range(3):
                  try:
                      r = requests.post(
                          "https://openrouter.ai/api/v1/chat/completions",
                          headers={
                              "Authorization": f"Bearer {OR_KEY}",
                              "Content-Type": "application/json"
                          },
                          json={
                              "model": "qwen/qwen3-coder-480b-a35b-instruct:free",
                              "messages": [
                                  {"role": "system", "content": system},
                                  {"role": "user",   "content": prompt}
                              ],
                              "max_tokens": 2000
                          },
                          timeout=90
                      )
                      data = r.json()
                      if "choices" in data:
                          return data["choices"][0]["message"]["content"]
                      else:
                          print(f"Unexpected API response: {data}")
                          time.sleep(5)
                  except Exception as e:
                      print(f"AI attempt {attempt+1} failed: {e}")
                      if attempt == 2:
                          return f"[AI unavailable after 3 attempts: {str(e)}]"
                      time.sleep(5)

          # ── Fetch Papers from arXiv API ───────────────────────────────────
          # Uses the official arXiv search API — works 7 days a week including weekends
          # Does NOT use RSS (RSS is empty on weekends and blocks some IPs)

          def fetch_arxiv_api(category, count=5):
              papers = []
              try:
                  url = (
                      f"https://export.arxiv.org/api/query?"
                      f"search_query=cat:{category}"
                      f"&sortBy=submittedDate&sortOrder=descending"
                      f"&max_results={count}"
                  )
                  resp = requests.get(
                      url,
                      timeout=30,
                      headers={"User-Agent": "HermesBot/1.0 (student research assistant)"}
                  )

                  content = resp.text

                  # Parse XML by splitting on entry tags (no extra library needed)
                  raw_entries = content.split("<entry>")[1:]

                  for entry in raw_entries[:count]:
                      # Title
                      title = ""
                      if "<title>" in entry:
                          title = entry.split("<title>")[1].split("</title>")[0].strip().replace("\n", " ")

                      # Abstract
                      abstract = ""
                      if "<summary>" in entry:
                          abstract = entry.split("<summary>")[1].split("</summary>")[0].strip().replace("\n", " ")

                      # Link
                      link = ""
                      if "<id>" in entry:
                          link = entry.split("<id>")[1].split("</id>")[0].strip()

                      # Authors (first 3 only)
                      author_list = []
                      for chunk in entry.split("<author>")[1:]:
                          if "<name>" in chunk:
                              name = chunk.split("<name>")[1].split("</name>")[0].strip()
                              author_list.append(name)
                      authors = ", ".join(author_list[:3])
                      if len(author_list) > 3:
                          authors += " et al."

                      # Published date
                      published = ""
                      if "<published>" in entry:
                          published = entry.split("<published>")[1].split("</published>")[0].strip()[:10]

                      if title:
                          papers.append({
                              "title":     title,
                              "abstract":  abstract[:800],
                              "link":      link,
                              "authors":   authors,
                              "published": published
                          })

              except Exception as e:
                  print(f"arXiv API error for {category}: {e}")

              return papers

          # ── Fetch from all 5 categories ───────────────────────────────────

          categories = {
              "AI (cs.AI)":               "cs.AI",
              "Machine Learning (cs.LG)": "cs.LG",
              "NLP (cs.CL)":              "cs.CL",
              "Computer Vision (cs.CV)":  "cs.CV",
              "Robotics (cs.RO)":         "cs.RO",
          }

          all_papers = []
          for cat_name, cat_code in categories.items():
              fetched = fetch_arxiv_api(cat_code, count=5)
              for p in fetched:
                  p["category"] = cat_name
              all_papers.extend(fetched)
              print(f"  {cat_name}: {len(fetched)} papers fetched")
              time.sleep(2)

          print(f"\nTotal papers fetched: {len(all_papers)}")

          # ── Safety check ──────────────────────────────────────────────────

          if len(all_papers) == 0:
              send(
                  "⚠️ Hermes Research Brief — arXiv returned 0 papers today.\n\n"
                  "This can happen if arXiv servers are down.\n"
                  "Will retry automatically tomorrow at 5 AM."
              )
              exit()

          today = datetime.now().strftime("%d %B %Y")

          # ── Opening message ───────────────────────────────────────────────

          send(
              f"🌄 5:00 AM Research Brief — {today}\n\n"
              f"📚 Fetched {len(all_papers)} papers from arXiv\n"
              f"   across AI, ML, NLP, Computer Vision & Robotics.\n\n"
              f"🔍 Picking the top 5 most impactful papers...\n"
              f"Detailed breakdowns below ☕\n"
              f"{'─'*30}"
          )

          # ── Step 1: Let AI pick the top 5 most impactful papers ───────────

          papers_list_text = ""
          for i, p in enumerate(all_papers):
              papers_list_text += (
                  f"\n[{i+1}] Category: {p['category']}\n"
                  f"Title: {p['title']}\n"
                  f"Authors: {p['authors']}\n"
                  f"Date: {p['published']}\n"
                  f"Abstract: {p['abstract'][:300]}\n"
                  f"{'─'*30}\n"
              )

          selection_prompt = f"""
          You are an expert AI/ML researcher reviewing today's arXiv papers.

          From the list below, select the TOP 5 papers that are:
          1. Most novel or surprising — doing something genuinely new
          2. Most likely to have real-world impact
          3. Most valuable for a student learning AI/ML to know about

          Return ONLY a numbered list of their exact titles, nothing else. Example:
          1. Exact Paper Title Here
          2. Another Exact Paper Title
          3. ...

          PAPERS:
          {papers_list_text[:5000]}
          """

          top_5_raw = ask_ai(selection_prompt)
          print(f"\nTop 5 selected by AI:\n{top_5_raw}\n")

          # ── Step 2: Detailed summary for each selected paper ──────────────

          summaries_sent = 0

          for i, paper in enumerate(all_papers):
              # Check if this paper was selected by the AI
              title_fragment = paper["title"][:50].lower()
              if title_fragment not in top_5_raw.lower():
                  continue

              if summaries_sent >= 5:
                  break

              summaries_sent += 1

              detail_prompt = f"""
          You are explaining a research paper to a smart student who knows Python and ML basics.
          Write a DETAILED, THOROUGH summary. This summary should fully replace reading the paper.

          Paper Title: {paper['title']}
          Authors: {paper['authors']}
          Published: {paper['published']}
          Category: {paper['category']}
          Abstract: {paper['abstract']}

          Write your summary in EXACTLY this format — do not skip any section:

          ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          📄 PAPER {summaries_sent} of 5
          ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

          📌 {paper['title']}
          👥 {paper['authors']}
          🏷️ {paper['category']} | 📅 {paper['published']}

          🎯 THE PROBLEM
          [3 sentences: What specific problem does this paper tackle?
          Why is it hard or unsolved? What gap does it fill in current research?]

          🛠️ THEIR APPROACH
          [4 sentences: What is their method, technique, or architecture?
          What makes it different from existing approaches?
          Explain the core idea in plain English — no unexplained jargon.
          If they use a novel architecture or training trick, explain it simply.]

          📊 RESULTS & NUMBERS
          [3 sentences: What did they achieve?
          Include specific benchmark numbers, accuracy improvements, speed gains.
          How does it compare to the previous best method?]

          🌍 REAL-WORLD IMPACT
          [3 sentences: Where can this actually be used?
          Who benefits — researchers, companies, everyday users?
          What does this make possible that wasn't possible before?]

          🎓 WHAT YOU SHOULD LEARN FROM THIS
          [2 sentences: What concept or technique from this paper is worth studying?
          Name a specific topic, algorithm, or tool you should look up to understand this better.]

          🔗 Full paper: {paper['link']}
          """

              summary = ask_ai(detail_prompt)
              send(summary)
              print(f"  Sent summary {summaries_sent}/5")
              time.sleep(3)

          # ── If AI selection missed papers (safety fallback) ───────────────

          if summaries_sent == 0:
              send("⚠️ AI paper selection returned no matches. Sending top 3 papers directly...")
              for paper in all_papers[:3]:
                  send(
                      f"📄 {paper['title']}\n"
                      f"👥 {paper['authors']}\n"
                      f"🏷️ {paper['category']}\n\n"
                      f"{paper['abstract']}\n\n"
                      f"🔗 {paper['link']}"
                  )
                  time.sleep(2)

          # ── Closing message ───────────────────────────────────────────────

          send(
              f"✅ Research brief complete! ({summaries_sent} papers)\n\n"
              f"📌 Pick ONE paper that interests you and skim the full PDF.\n"
              f"💬 Message your Hermes bot to explain any concept from these papers.\n\n"
              f"See you at 7 AM for AI/ML + Java news! 🚀"
          )

          print(f"\n✅ Done! Sent {summaries_sent} paper summaries.")
          EOF
