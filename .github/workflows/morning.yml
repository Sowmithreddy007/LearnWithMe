name: Hermes Morning Brief 7AM

on:
  schedule:
    - cron: '30 1 * * *'   # 7:00 AM IST every day
  workflow_dispatch:

jobs:
  morning-brief:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install requests -q

      - name: Write Python script
        run: |
          cat > morning.py << 'PYEOF'
          import requests, os, time
          from datetime import datetime

          TOKEN = os.environ["TELEGRAM_TOKEN"]
          CHAT_ID = os.environ["CHAT_ID"]
          OR_KEY = os.environ["OPENROUTER_KEY"]

          MODELS = [
              "nvidia/nemotron-3-super-120b-a12b:free",
              "meta-llama/llama-3.3-70b-instruct:free",
              "google/gemma-3-27b-it:free",
          ]

          # ── Helpers ───────────────────────────────────────────────────────

          def send(text):
              chunks = [text[i:i+4000] for i in range(0, len(text), 4000)]
              for chunk in chunks:
                  try:
                      requests.post(
                          f"https://api.telegram.org/bot{TOKEN}/sendMessage",
                          json={"chat_id": CHAT_ID, "text": chunk},
                          timeout=15
                      )
                  except Exception as e:
                      print(f"Telegram error: {e}")
                  time.sleep(1)

          def ask_ai(prompt, system="You are a sharp, concise AI/tech analyst."):
              for model in MODELS:
                  for attempt in range(2):
                      try:
                          r = requests.post(
                              "https://openrouter.ai/api/v1/chat/completions",
                              headers={
                                  "Authorization": f"Bearer {OR_KEY}",
                                  "Content-Type": "application/json"
                              },
                              json={
                                  "model": model,
                                  "messages": [
                                      {"role": "system", "content": system},
                                      {"role": "user", "content": prompt}
                                  ],
                                  "max_tokens": 1500
                              },
                              timeout=90
                          )
                          data = r.json()
                          if "choices" in data and data["choices"]:
                              print(f"Model used: {model}")
                              return data["choices"][0]["message"]["content"]
                          else:
                              print(f"Model {model} failed: {data.get('error', {}).get('message', 'unknown')}")
                              break
                      except Exception as e:
                          print(f"Attempt {attempt+1} error: {e}")
                          time.sleep(3)
              return None

          def fetch_rss(url, count=5):
              items = []
              try:
                  resp = requests.get(url, timeout=15, headers={"User-Agent": "HermesBot/1.0"})
                  content = resp.text
                  entries = content.split("<item>")[1:]
                  for entry in entries[:count]:
                      title = ""
                      if "<title>" in entry:
                          raw = entry.split("<title>")[1].split("</title>")[0].strip()
                          title = raw.replace("<![CDATA[", "").replace("]]>", "").strip()
                      desc = ""
                      if "<description>" in entry:
                          raw = entry.split("<description>")[1].split("</description>")[0].strip()
                          desc = raw.replace("<![CDATA[", "").replace("]]>", "").strip()[:200]
                      link = ""
                      if "<link>" in entry:
                          link = entry.split("<link>")[1].split("</link>")[0].strip()
                      if title:
                          items.append(f"- {title}: {desc}")
              except Exception as e:
                  print(f"RSS error {url}: {e}")
              return "\n".join(items)

          # ── Read today's learning topic ───────────────────────────────────

          def get_learning_topic():
              try:
                  with open("learning_log.txt", "r") as f:
                      lines = [l.strip() for l in f.readlines() if l.strip()]
                  if lines:
                      last = lines[-1]
                      # Format is "2026-05-10: Python decorators"
                      # Extract just the topic part after the colon
                      if ":" in last:
                          parts = last.split(":", 1)
                          # Check if first part looks like a date
                          topic = parts[1].strip() if len(parts) > 1 else last
                      else:
                          topic = last
                      print(f"Learning topic found: {topic}")
                      return topic
              except Exception as e:
                  print(f"Could not read learning_log.txt: {e}")
              return None

          today = datetime.now().strftime("%d %B %Y")
          weekday = datetime.now().strftime("%A")

          # ── GREETING ─────────────────────────────────────────────────────

          send(
              f"Good Morning! - {today} ({weekday})\n\n"
              f"Hermes 7 AM Brief\n"
              f"4 updates incoming:\n"
              f"1. AI/ML News\n"
              f"2. Hacker News\n"
              f"3. Java in AI/ML\n"
              f"4. Coding Challenges (based on your learning)\n\n"
              f"Let's go!"
          )

          # ═════════════════════════════════════════════════════════════════
          # SECTION 1 — AI/ML NEWS
          # ═════════════════════════════════════════════════════════════════

          aiml_sources = {
              "TechCrunch AI":     "https://techcrunch.com/category/artificial-intelligence/feed/",
              "VentureBeat AI":    "https://venturebeat.com/category/ai/feed/",
              "MIT Tech Review":   "https://www.technologyreview.com/feed/",
              "The Verge AI":      "https://www.theverge.com/rss/ai-artificial-intelligence/index.xml",
              "Ars Technica":      "https://feeds.arstechnica.com/arstechnica/index",
              "Hugging Face Blog": "https://huggingface.co/blog/feed.xml",
          }

          aiml_raw = ""
          for name, url in aiml_sources.items():
              chunk = fetch_rss(url, count=4)
              if chunk:
                  aiml_raw += f"\n[{name}]\n{chunk}\n"
              time.sleep(0.5)

          aiml_summary = ask_ai(
              f"Summarize today's AI and ML news for a student who codes and follows the field closely.\n\n"
              f"From the articles below, pick the 6 most important stories.\n"
              f"For each story write:\n"
              f"[Headline] - [2 sentence summary: what happened and why it matters]\n\n"
              f"Focus on: new model releases, benchmark records, company announcements, "
              f"research breakthroughs, AI policy.\n"
              f"Be specific - mention model names, company names, numbers.\n\n"
              f"Articles:\n{aiml_raw[:4000]}"
          )

          if aiml_summary:
              send(f"AI & ML NEWS\n{'─'*35}\n\n{aiml_summary}")
          else:
              send("AI & ML NEWS\n" + "─"*35 + "\n\nCould not fetch AI news today.")
          time.sleep(2)

          # ═════════════════════════════════════════════════════════════════
          # SECTION 2 — HACKER NEWS
          # ═════════════════════════════════════════════════════════════════

          try:
              # Algolia HN API - most reliable, returns rich data
              hn_resp = requests.get(
                  "https://hn.algolia.com/api/v1/search?tags=front_page&hitsPerPage=15",
                  timeout=15,
                  headers={"User-Agent": "HermesBot/1.0"}
              )
              hn_data = hn_resp.json()
              hn_stories = []
              for hit in hn_data.get("hits", [])[:15]:
                  title = hit.get("title", "")
                  points = hit.get("points", 0)
                  comments = hit.get("num_comments", 0)
                  url = hit.get("url", "")
                  obj_id = hit.get("objectID", "")
                  hn_link = f"https://news.ycombinator.com/item?id={obj_id}"
                  if title:
                      hn_stories.append(
                          f"- {title} ({points} pts, {comments} comments)\n"
                          f"  {hn_link}"
                      )
              hn_raw = "\n".join(hn_stories)
              print(f"Hacker News: {len(hn_stories)} stories fetched")
          except Exception as e:
              print(f"Hacker News fetch error: {e}")
              hn_raw = ""

          if hn_raw:
              hn_summary = ask_ai(
                  f"Summarize what is trending on Hacker News today for a developer/student.\n\n"
                  f"From these stories, pick the 5 most interesting for someone interested in "
                  f"AI, ML, programming, startups, and tech.\n\n"
                  f"For each write:\n"
                  f"[Story title] - [2 sentences: what it is and why the HN community finds it interesting]\n"
                  f"Include the HN link at the end of each entry.\n\n"
                  f"Stories:\n{hn_raw[:3000]}"
              )
              if hn_summary:
                  send(f"HACKER NEWS TODAY\n{'─'*35}\n\n{hn_summary}")
          else:
              send("HACKER NEWS TODAY\n" + "─"*35 + "\n\nCould not fetch Hacker News today.")
          time.sleep(2)

          # ═════════════════════════════════════════════════════════════════
          # SECTION 3 — JAVA IN AI/ML
          # ═════════════════════════════════════════════════════════════════

          java_sources = {
              "InfoQ Java":       "https://feed.infoq.com/java",
              "InfoQ AI/ML":      "https://feed.infoq.com/ai-ml-data-eng",
              "Baeldung":         "https://www.baeldung.com/feed/",
              "Inside Java":      "https://inside.java/feed.xml",
              "DZone Java":       "https://feeds.dzone.com/java",
          }

          java_raw = ""
          for name, url in java_sources.items():
              chunk = fetch_rss(url, count=4)
              if chunk:
                  java_raw += f"\n[{name}]\n{chunk}\n"
              time.sleep(0.5)

          java_summary = ask_ai(
              f"Summarize the latest Java news related to AI, ML, and modern development.\n\n"
              f"From the articles below, pick the 5 most relevant updates for a Java developer "
              f"interested in AI/ML.\n\n"
              f"For each write:\n"
              f"[Topic/Library/Feature] - [2 sentences: what it is and why a Java developer should care]\n\n"
              f"Focus on: Java AI libraries (DJL, LangChain4j, Deeplearning4j), "
              f"Spring AI, new Java features for data/AI, JVM performance for ML.\n"
              f"Skip anything not related to Java or AI.\n\n"
              f"Articles:\n{java_raw[:4000]}"
          )

          if java_summary:
              send(f"JAVA IN AI & ML\n{'─'*35}\n\n{java_summary}")
          else:
              send("JAVA IN AI & ML\n" + "─"*35 + "\n\nCould not fetch Java news today.")
          time.sleep(2)

          # ═════════════════════════════════════════════════════════════════
          # SECTION 4 — CODING CHALLENGES BASED ON YOUR LEARNING
          # ═════════════════════════════════════════════════════════════════

          learning_topic = get_learning_topic()

          if learning_topic:
              challenge_prompt = (
                  f"Generate 3 coding challenges specifically on this topic: {learning_topic}\n\n"
                  f"The student recently studied this topic so challenges must directly test "
                  f"and reinforce what they learned. Do NOT go off-topic.\n\n"
                  f"Use this EXACT format:\n\n"
                  f"YOUR TOPIC TODAY: {learning_topic}\n\n"
                  f"EASY\n"
                  f"Task: [a beginner-friendly challenge directly on {learning_topic}]\n"
                  f"What to use: [specific function, method, or concept from the topic]\n"
                  f"Expected output: [show exact output]\n\n"
                  f"MEDIUM\n"
                  f"Task: [intermediate challenge - combines {learning_topic} with something practical]\n"
                  f"What to use: [specific tools or concepts]\n"
                  f"Expected output: [show exact output]\n\n"
                  f"HARD\n"
                  f"Task: [advanced challenge - real-world application of {learning_topic}]\n"
                  f"Hint: [one-line hint]\n"
                  f"Expected output: [show exact output]\n\n"
                  f"BONUS QUESTION\n"
                  f"Task: [a conceptual or tricky question about {learning_topic} that tests deep understanding]\n"
                  f"Answer: [short answer]\n\n"
                  f"Keep all challenges in Python unless the topic is specifically about Java or another language."
              )
              challenge = ask_ai(challenge_prompt)
          else:
              # Fallback if learning_log.txt is missing or empty
              challenge = ask_ai(
                  f"Generate 3 coding challenges on Python fundamentals.\n\n"
                  f"Note at the top: Update your learning_log.txt file in GitHub with what "
                  f"you studied yesterday to get personalized challenges!\n\n"
                  f"EASY\n"
                  f"Task: [challenge]\n"
                  f"Expected output: [output]\n\n"
                  f"MEDIUM\n"
                  f"Task: [challenge]\n"
                  f"Expected output: [output]\n\n"
                  f"HARD\n"
                  f"Task: [challenge]\n"
                  f"Hint: [hint]\n"
                  f"Expected output: [output]"
              )

          if challenge:
              send(
                  f"DAILY CODING CHALLENGES\n{'─'*35}\n\n"
                  f"{challenge}\n\n"
                  f"─────\n"
                  f"To update your topic: edit learning_log.txt in your GitHub repo\n"
                  f"Format: 2026-05-10: your topic here"
              )
          time.sleep(2)

          # ── Done ─────────────────────────────────────────────────────────

          send(
              f"That is your 7 AM brief!\n\n"
              f"Research papers are in your inbox from 5 AM.\n"
              f"Have a productive day!"
          )

          print("Morning brief sent successfully!")
          PYEOF

      - name: Run Morning Brief
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          OPENROUTER_KEY: ${{ secrets.OPENROUTER_KEY }}
        run: python morning.py
