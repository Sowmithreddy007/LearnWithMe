name: Hermes Morning Brief 7AM

on:
  schedule:
    - cron: '30 1 * * *'
  workflow_dispatch:

jobs:
  morning-brief:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install requests -q

      - name: Write Python script
        run: |
          cat > morning.py << 'PYEOF'
          import requests, os, time, smtplib
          from email.mime.multipart import MIMEMultipart
          from email.mime.text import MIMEText
          from datetime import datetime

          TOKEN      = os.environ["TELEGRAM_TOKEN"]
          CHAT_ID    = os.environ["CHAT_ID"]
          OR_KEY     = os.environ["OPENROUTER_KEY"]
          GMAIL_USER = os.environ["GMAIL_USER"]
          GMAIL_PASS = os.environ["GMAIL_APP_PASSWORD"]

          MODELS = [
              "nvidia/nemotron-3-super-120b-a12b:free",
              "meta-llama/llama-3.3-70b-instruct:free",
              "google/gemma-3-27b-it:free",
          ]

          # ── Telegram ──────────────────────────────────────────────────────

          def send(text):
              chunks = [text[i:i+4000] for i in range(0, len(text), 4000)]
              for chunk in chunks:
                  try:
                      requests.post(
                          f"https://api.telegram.org/bot{TOKEN}/sendMessage",
                          json={"chat_id": CHAT_ID, "text": chunk},
                          timeout=15
                      )
                  except Exception as e:
                      print(f"Telegram error: {e}")
                  time.sleep(1)

          # ── AI ────────────────────────────────────────────────────────────

          def ask_ai(prompt, system="You are a sharp, concise AI/tech analyst."):
              for model in MODELS:
                  for attempt in range(2):
                      try:
                          r = requests.post(
                              "https://openrouter.ai/api/v1/chat/completions",
                              headers={
                                  "Authorization": f"Bearer {OR_KEY}",
                                  "Content-Type": "application/json"
                              },
                              json={
                                  "model": model,
                                  "messages": [
                                      {"role": "system", "content": system},
                                      {"role": "user", "content": prompt}
                                  ],
                                  "max_tokens": 1500
                              },
                              timeout=90
                          )
                          data = r.json()
                          if "choices" in data and data["choices"]:
                              print(f"Model used: {model}")
                              return data["choices"][0]["message"]["content"]
                          else:
                              print(f"Model {model} failed: {data.get('error',{}).get('message','unknown')}")
                              break
                      except Exception as e:
                          print(f"Attempt {attempt+1} error: {e}")
                          time.sleep(3)
              return None

          # ── RSS ───────────────────────────────────────────────────────────

          def fetch_rss(url, count=5):
              items = []
              try:
                  resp = requests.get(url, timeout=15, headers={"User-Agent": "HermesBot/1.0"})
                  content = resp.text
                  entries = content.split("<item>")[1:]
                  for entry in entries[:count]:
                      title = ""
                      if "<title>" in entry:
                          raw = entry.split("<title>")[1].split("</title>")[0].strip()
                          title = raw.replace("<![CDATA[", "").replace("]]>", "").strip()
                      desc = ""
                      if "<description>" in entry:
                          raw = entry.split("<description>")[1].split("</description>")[0].strip()
                          desc = raw.replace("<![CDATA[", "").replace("]]>", "").strip()[:200]
                      if title:
                          items.append(f"- {title}: {desc}")
              except Exception as e:
                  print(f"RSS error {url}: {e}")
              return "\n".join(items)

          # ── Learning topic ────────────────────────────────────────────────

          def get_learning_topic():
              try:
                  with open("learning_log.txt", "r") as f:
                      lines = [l.strip() for l in f.readlines() if l.strip()]
                  if lines:
                      last = lines[-1]
                      if ":" in last:
                          parts = last.split(":", 1)
                          return parts[1].strip() if len(parts) > 1 else last
                      return last
              except Exception as e:
                  print(f"Could not read learning_log.txt: {e}")
              return None

          # ── HTML Helpers ──────────────────────────────────────────────────

          def plain_to_html(text):
              if not text:
                  return "<p style='color:#999;font-family:Arial,sans-serif;'>Content unavailable.</p>"
              lines = text.split("\n")
              parts = []
              for line in lines:
                  s = line.strip()
                  if not s:
                      parts.append("<div style='height:6px;'></div>")
                  elif s.startswith("- ") or s.startswith("* "):
                      parts.append(
                          "<div style='display:flex;align-items:flex-start;margin:7px 0;'>"
                          "<span style='color:#c9a227;margin-right:10px;margin-top:2px;"
                          "font-size:16px;line-height:1;'>&#8226;</span>"
                          "<span style='flex:1;color:#333;font-size:14px;line-height:1.7;"
                          "font-family:Georgia,serif;'>" + s[2:] + "</span>"
                          "</div>"
                      )
                  elif s.isupper() and 2 < len(s) < 60:
                      parts.append(
                          "<p style='font-family:Arial,sans-serif;font-size:10px;font-weight:bold;"
                          "color:#1a1a2e;letter-spacing:2px;margin:16px 0 6px;"
                          "text-transform:uppercase;border-bottom:1px solid #e8e4d9;"
                          "padding-bottom:5px;'>" + s + "</p>"
                      )
                  elif any(s.startswith(k) for k in ["Task:", "What to use:", "Expected output:", "Hint:", "Answer:", "Full paper:"]):
                      key, _, val = s.partition(":")
                      parts.append(
                          "<p style='margin:5px 0;font-size:13px;font-family:Arial,sans-serif;'>"
                          "<strong style='color:#555;'>" + key + ":</strong>"
                          "<span style='color:#333;'> " + val.strip() + "</span></p>"
                      )
                  else:
                      parts.append(
                          "<p style='margin:6px 0;line-height:1.75;color:#333;"
                          "font-size:14px;font-family:Georgia,serif;'>" + s + "</p>"
                      )
              return "\n".join(parts)

          def build_section(label, color, icon, content_html):
              return (
                  "<table role='presentation' width='100%' cellpadding='0' cellspacing='0'"
                  " style='margin-top:32px;'><tr><td>"

                  # Section header badge
                  "<table role='presentation' width='100%' cellpadding='0' cellspacing='0'"
                  " style='margin-bottom:16px;'><tr>"
                  "<td style='border-bottom:2px solid " + color + ";padding-bottom:8px;'>"
                  "<span style='background:" + color + ";color:#fff;font-family:Arial,sans-serif;"
                  "font-size:9px;letter-spacing:2px;padding:5px 14px;"
                  "text-transform:uppercase;font-weight:bold;'>"
                  + icon + " " + label +
                  "</span>"
                  "</td></tr></table>"

                  # Content
                  "<div style='padding:0 4px;'>" + content_html + "</div>"

                  "</td></tr></table>"
              )

          def build_divider():
              return (
                  "<table role='presentation' width='100%' cellpadding='0' cellspacing='0'"
                  " style='margin:20px 0;'><tr>"
                  "<td style='border-top:1px solid #e8e4d9;'></td>"
                  "</tr></table>"
              )

          def build_full_email(date, weekday, sections_html):
              return (
                  "<!DOCTYPE html><html lang='en'>"
                  "<head><meta charset='UTF-8'>"
                  "<meta name='viewport' content='width=device-width,initial-scale=1'>"
                  "<title>The Hermes Daily</title></head>"
                  "<body style='margin:0;padding:0;background-color:#f0ede6;"
                  "font-family:Georgia,serif;'>"

                  # Outer wrapper
                  "<table role='presentation' width='100%' cellpadding='0' cellspacing='0'"
                  " style='background:#f0ede6;'>"
                  "<tr><td align='center' style='padding:24px 12px;'>"

                  # Main container
                  "<table role='presentation' style='max-width:660px;width:100%;"
                  "background:#ffffff;border:1px solid #d4c9b0;"
                  "box-shadow:0 2px 8px rgba(0,0,0,0.08);'>"

                  # Top accent lines
                  "<tr><td style='background:#1a1a2e;height:5px;'></td></tr>"
                  "<tr><td style='background:#c9a227;height:3px;'></td></tr>"

                  # Masthead
                  "<tr><td style='background:#1a1a2e;padding:32px 40px;text-align:center;'>"
                  "<p style='color:#c9a227;font-size:9px;letter-spacing:5px;margin:0 0 10px;"
                  "font-family:Arial,sans-serif;text-transform:uppercase;"
                  "font-weight:bold;'>Your Personal Intelligence Brief</p>"
                  "<h1 style='color:#ffffff;font-size:44px;margin:0;"
                  "letter-spacing:4px;font-family:Georgia,serif;"
                  "font-weight:normal;line-height:1;'>THE HERMES DAILY</h1>"
                  "<div style='border-top:1px solid #333;margin:14px 0 0;padding-top:12px;'>"
                  "<p style='color:#999;font-size:10px;margin:0;"
                  "font-family:Arial,sans-serif;letter-spacing:1px;'>"
                  + date + " &nbsp;&bull;&nbsp; " + weekday + " Morning Edition"
                  " &nbsp;&bull;&nbsp; HERMES AI"
                  "</p></div>"
                  "</td></tr>"

                  # Gold dividers
                  "<tr><td style='background:#c9a227;height:3px;'></td></tr>"
                  "<tr><td style='background:#1a1a2e;height:1px;'></td></tr>"

                  # Content area
                  "<tr><td style='padding:20px 40px 40px;background:#fff;'>"
                  + sections_html +
                  "</td></tr>"

                  # Footer top line
                  "<tr><td style='background:#e8e4d9;height:1px;'></td></tr>"
                  "<tr><td style='background:#c9a227;height:3px;'></td></tr>"

                  # Footer
                  "<tr><td style='background:#1a1a2e;padding:22px 40px;text-align:center;'>"
                  "<p style='color:#c9a227;font-size:11px;margin:0;"
                  "font-family:Arial,sans-serif;letter-spacing:3px;"
                  "font-weight:bold;text-transform:uppercase;'>The Hermes Daily</p>"
                  "<p style='color:#666;font-size:10px;margin:8px 0 0;"
                  "font-family:Arial,sans-serif;letter-spacing:0.5px;'>"
                  "Automated by GitHub Actions &bull; AI by OpenRouter &bull; "
                  "News from TechCrunch, VentureBeat, MIT, HackerNews, InfoQ"
                  "</p></td></tr>"

                  "<tr><td style='background:#c9a227;height:3px;'></td></tr>"

                  "</table>"
                  "</td></tr></table>"
                  "</body></html>"
              )

          # ── Send email via Gmail SMTP ─────────────────────────────────────

          def send_email(subject, html_body):
              try:
                  msg = MIMEMultipart("alternative")
                  msg["Subject"] = subject
                  msg["From"] = f"Hermes Daily <{GMAIL_USER}>"
                  msg["To"] = GMAIL_USER
                  msg.attach(MIMEText(html_body, "html"))
                  with smtplib.SMTP("smtp.gmail.com", 587) as server:
                      server.ehlo()
                      server.starttls()
                      server.login(GMAIL_USER, GMAIL_PASS)
                      server.sendmail(GMAIL_USER, GMAIL_USER, msg.as_string())
                  print("Email sent successfully!")
              except Exception as e:
                  print(f"Email error: {e}")

          # ═════════════════════════════════════════════════════════════════
          # MAIN
          # ═════════════════════════════════════════════════════════════════

          today   = datetime.now().strftime("%d %B %Y")
          weekday = datetime.now().strftime("%A")

          send(
              f"Good Morning! - {today} ({weekday})\n\n"
              f"Hermes 7 AM Brief incoming:\n"
              f"1. AI & ML News\n"
              f"2. Hacker News\n"
              f"3. Java in AI/ML\n"
              f"4. Coding Challenges (your topic)\n\n"
              f"Full newsletter also sent to your email!"
          )

          email_sections = []

          # ── 1. AI/ML NEWS ─────────────────────────────────────────────────

          print("Fetching AI/ML news...")
          aiml_sources = {
              "TechCrunch AI":     "https://techcrunch.com/category/artificial-intelligence/feed/",
              "VentureBeat AI":    "https://venturebeat.com/category/ai/feed/",
              "MIT Tech Review":   "https://www.technologyreview.com/feed/",
              "The Verge AI":      "https://www.theverge.com/rss/ai-artificial-intelligence/index.xml",
              "Ars Technica":      "https://feeds.arstechnica.com/arstechnica/index",
              "Hugging Face Blog": "https://huggingface.co/blog/feed.xml",
          }

          aiml_raw = ""
          for name, url in aiml_sources.items():
              chunk = fetch_rss(url, count=4)
              if chunk:
                  aiml_raw += f"\n[{name}]\n{chunk}\n"
              time.sleep(0.5)

          aiml_summary = ask_ai(
              "Summarize today's AI and ML news for a student who codes and follows the field closely.\n\n"
              "Pick the 6 most important stories from the articles below.\n"
              "For each story write:\n"
              "- [Headline]: [2 sentence summary of what happened and why it matters]\n\n"
              "Focus on: new model releases, benchmark records, major announcements, breakthroughs.\n"
              "Be specific - mention model names, companies, numbers.\n\n"
              f"Articles:\n{aiml_raw[:4000]}"
          )

          if aiml_summary:
              send(f"AI & ML NEWS\n{'─'*35}\n\n{aiml_summary}")
              email_sections.append(build_section("AI & ML News", "#1a1a2e", "AI", plain_to_html(aiml_summary)))
              email_sections.append(build_divider())
          time.sleep(2)

          # ── 2. HACKER NEWS ────────────────────────────────────────────────

          print("Fetching Hacker News...")
          hn_raw = ""
          try:
              hn_resp = requests.get(
                  "https://hn.algolia.com/api/v1/search?tags=front_page&hitsPerPage=15",
                  timeout=15,
                  headers={"User-Agent": "HermesBot/1.0"}
              )
              hn_data = hn_resp.json()
              hn_stories = []
              for hit in hn_data.get("hits", [])[:15]:
                  title    = hit.get("title", "")
                  points   = hit.get("points", 0)
                  comments = hit.get("num_comments", 0)
                  obj_id   = hit.get("objectID", "")
                  hn_link  = f"https://news.ycombinator.com/item?id={obj_id}"
                  if title:
                      hn_stories.append(f"- {title} ({points} pts, {comments} comments) {hn_link}")
              hn_raw = "\n".join(hn_stories)
              print(f"HN: {len(hn_stories)} stories fetched")
          except Exception as e:
              print(f"HN error: {e}")

          if hn_raw:
              hn_summary = ask_ai(
                  "Summarize what is trending on Hacker News today for a developer/student.\n\n"
                  "Pick the 5 most interesting stories for someone interested in AI, ML, programming, startups.\n"
                  "For each write:\n"
                  "- [Story title]: [2 sentences on what it is and why HN finds it interesting]\n\n"
                  f"Stories:\n{hn_raw[:3000]}"
              )
              if hn_summary:
                  send(f"HACKER NEWS TODAY\n{'─'*35}\n\n{hn_summary}")
                  email_sections.append(build_section("Hacker News", "#ff6600", "HN", plain_to_html(hn_summary)))
                  email_sections.append(build_divider())
          time.sleep(2)

          # ── 3. JAVA IN AI/ML ──────────────────────────────────────────────

          print("Fetching Java news...")
          java_sources = {
              "InfoQ Java":  "https://feed.infoq.com/java",
              "InfoQ AI/ML": "https://feed.infoq.com/ai-ml-data-eng",
              "Baeldung":    "https://www.baeldung.com/feed/",
              "Inside Java": "https://inside.java/feed.xml",
              "DZone Java":  "https://feeds.dzone.com/java",
          }

          java_raw = ""
          for name, url in java_sources.items():
              chunk = fetch_rss(url, count=4)
              if chunk:
                  java_raw += f"\n[{name}]\n{chunk}\n"
              time.sleep(0.5)

          java_summary = ask_ai(
              "Summarize the latest Java news related to AI, ML, and modern development.\n\n"
              "Pick the 5 most relevant updates for a Java developer interested in AI/ML.\n"
              "For each write:\n"
              "- [Topic/Library]: [2 sentences on what it is and why a Java dev should care]\n\n"
              "Focus on: DJL, LangChain4j, Deeplearning4j, Spring AI, new Java features for data/AI.\n"
              "Skip anything not related to Java or AI.\n\n"
              f"Articles:\n{java_raw[:4000]}"
          )

          if java_summary:
              send(f"JAVA IN AI & ML\n{'─'*35}\n\n{java_summary}")
              email_sections.append(build_section("Java in AI & ML", "#e76f00", "J", plain_to_html(java_summary)))
              email_sections.append(build_divider())
          time.sleep(2)

          # ── 4. CODING CHALLENGES ──────────────────────────────────────────

          print("Generating coding challenges...")
          learning_topic = get_learning_topic()

          if learning_topic:
              challenge_prompt = (
                  f"Generate 3 coding challenges specifically on this topic: {learning_topic}\n\n"
                  "The student recently studied this. Challenges must directly test what they learned.\n\n"
                  f"YOUR TOPIC: {learning_topic}\n\n"
                  "EASY\n"
                  f"Task: [beginner challenge directly testing {learning_topic}]\n"
                  "What to use: [specific concept or method]\n"
                  "Expected output: [exact output]\n\n"
                  "MEDIUM\n"
                  f"Task: [intermediate challenge combining {learning_topic} with something practical]\n"
                  "What to use: [specific tools]\n"
                  "Expected output: [exact output]\n\n"
                  "HARD\n"
                  f"Task: [advanced real-world application of {learning_topic}]\n"
                  "Hint: [one-line hint]\n"
                  "Expected output: [exact output]\n\n"
                  "BONUS\n"
                  f"Task: [conceptual question testing deep understanding of {learning_topic}]\n"
                  "Answer: [short answer]"
              )
          else:
              challenge_prompt = (
                  "Generate 3 Python coding challenges on fundamentals.\n\n"
                  "Add this note at top: Update your learning_log.txt in GitHub for personalized challenges!\n\n"
                  "EASY\nTask: [challenge]\nExpected output: [output]\n\n"
                  "MEDIUM\nTask: [challenge]\nExpected output: [output]\n\n"
                  "HARD\nTask: [challenge]\nHint: [hint]\nExpected output: [output]"
              )

          challenge = ask_ai(challenge_prompt)
          topic_label = learning_topic if learning_topic else "Python Fundamentals"

          if challenge:
              send(f"DAILY CODING CHALLENGES\n{'─'*35}\n\nTopic: {topic_label}\n\n{challenge}")
              email_sections.append(build_section(
                  f"Daily Coding Challenges - {topic_label}",
                  "#2d6a4f", "CODE", plain_to_html(challenge)
              ))

          # ── Build and send HTML email ─────────────────────────────────────

          if email_sections:
              print("Building and sending email...")
              html = build_full_email(today, weekday, "".join(email_sections))
              send_email(f"The Hermes Daily - {today} Morning Brief", html)

          send(
              f"Done! Your 7 AM brief is complete.\n\n"
              f"Full newsletter sent to your email inbox.\n"
              f"Research papers from 5 AM are also in your inbox.\n"
              f"Have a productive day!"
          )

          print("Morning brief complete!")
          PYEOF

      - name: Run Morning Brief
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          OPENROUTER_KEY: ${{ secrets.OPENROUTER_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python morning.py
