name: Hermes Morning Brief 8AM

on:
  schedule:
    - cron: '30 2 * * *'   # 8:00 AM IST every day
  workflow_dispatch:

jobs:
  morning-brief:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install requests -q

      - name: Write Python script
        run: |
          cat > morning.py << 'PYEOF'
          import requests, os, time, smtplib
          from email.mime.multipart import MIMEMultipart
          from email.mime.text import MIMEText
          from datetime import datetime

          TOKEN      = os.environ["TELEGRAM_TOKEN"]
          CHAT_ID    = os.environ["CHAT_ID"]
          OR_KEY     = os.environ["OPENROUTER_KEY"]
          GMAIL_USER = os.environ["GMAIL_USER"]
          GMAIL_PASS = os.environ["GMAIL_APP_PASSWORD"]

          MODELS = [
              "nvidia/nemotron-3-super-120b-a12b:free",
              "meta-llama/llama-3.3-70b-instruct:free",
              "google/gemma-3-27b-it:free",
          ]

          # ── Telegram ──────────────────────────────────────────────────────

          def send(text):
              chunks = [text[i:i+4000] for i in range(0, len(text), 4000)]
              for chunk in chunks:
                  try:
                      requests.post(
                          f"https://api.telegram.org/bot{TOKEN}/sendMessage",
                          json={"chat_id": CHAT_ID, "text": chunk},
                          timeout=15
                      )
                  except Exception as e:
                      print(f"Telegram error: {e}")
                  time.sleep(1)

          # ── AI ────────────────────────────────────────────────────────────

          def ask_ai(prompt, system="You are a patient teacher who explains things to complete beginners using plain English, real-world analogies, and zero jargon."):
              for model in MODELS:
                  for attempt in range(2):
                      try:
                          r = requests.post(
                              "https://openrouter.ai/api/v1/chat/completions",
                              headers={
                                  "Authorization": f"Bearer {OR_KEY}",
                                  "Content-Type": "application/json"
                              },
                              json={
                                  "model": model,
                                  "messages": [
                                      {"role": "system", "content": system},
                                      {"role": "user", "content": prompt}
                                  ],
                                  "max_tokens": 1800
                              },
                              timeout=90
                          )
                          data = r.json()
                          if "choices" in data and data["choices"]:
                              print(f"Model used: {model}")
                              return data["choices"][0]["message"]["content"]
                          else:
                              print(f"Model {model} failed: {data.get('error',{}).get('message','unknown')}")
                              break
                      except Exception as e:
                          print(f"Attempt {attempt+1} error: {e}")
                          time.sleep(3)
              return None

          # ── RSS ───────────────────────────────────────────────────────────

          def fetch_rss(url, count=5):
              items = []
              try:
                  resp = requests.get(
                      url, timeout=15,
                      headers={"User-Agent": "HermesBot/1.0"}
                  )
                  content = resp.text
                  entries = content.split("<item>")[1:]
                  for entry in entries[:count]:
                      title = ""
                      if "<title>" in entry:
                          raw = entry.split("<title>")[1].split("</title>")[0].strip()
                          title = raw.replace("<![CDATA[", "").replace("]]>", "").strip()
                      desc = ""
                      if "<description>" in entry:
                          raw = entry.split("<description>")[1].split("</description>")[0].strip()
                          desc = raw.replace("<![CDATA[", "").replace("]]>", "").strip()[:200]
                      if title:
                          items.append(f"- {title}: {desc}")
              except Exception as e:
                  print(f"RSS error {url}: {e}")
              return "\n".join(items)

          # ── Learning topic + difficulty ───────────────────────────────────

          def get_learning_topic():
              try:
                  with open("learning_log.txt", "r") as f:
                      lines = [l.strip() for l in f.readlines() if l.strip()]
                  if not lines:
                      return None, "Medium"
                  last = lines[-1]
                  # Strip date prefix if present (e.g. "2026-05-14: ")
                  if ": " in last:
                      last = last.split(": ", 1)[1].strip()
                  # Check for difficulty suffix (e.g. "Python decorators | Hard")
                  difficulty = "Medium"
                  if " | " in last:
                      parts = last.rsplit(" | ", 1)
                      topic = parts[0].strip()
                      diff_raw = parts[1].strip().capitalize()
                      if diff_raw in ["Easy", "Medium", "Hard"]:
                          difficulty = diff_raw
                  else:
                      topic = last.strip()
                  print(f"Topic: {topic} | Difficulty: {difficulty}")
                  return topic, difficulty
              except Exception as e:
                  print(f"Could not read learning_log.txt: {e}")
              return None, "Medium"

          # ── Build news section prompt ─────────────────────────────────────

          def build_news_prompt(source_name, articles_raw, topic_hint=""):
              return (
                  f"You are summarizing {source_name} news for a complete beginner in AI/ML/tech.\n"
                  f"They have just started learning. Use plain English.\n\n"
                  f"From the articles below, pick the 5 most important stories.\n"
                  f"For EACH story use EXACTLY this structure:\n\n"
                  f"STORY: [headline in plain English]\n\n"
                  f"SIMPLE VERSION\n"
                  f"[2-3 sentences a 15-year-old can understand. "
                  f"No jargon. What happened and why it matters.]\n\n"
                  f"REAL-WORLD ANALOGY\n"
                  f"[One sentence comparing this to something from daily life.]\n\n"
                  f"WHY IT MATTERS\n"
                  f"[1-2 sentences: who does this affect and how]\n\n"
                  f"---\n\n"
                  f"Articles:\n{articles_raw[:4000]}"
              )

          # ── HTML helpers ──────────────────────────────────────────────────

          def plain_to_html(text):
              if not text:
                  return "<p style='color:#999;font-family:Arial,sans-serif;'>Unavailable.</p>"
              lines = text.split("\n")
              parts = []
              in_story = False
              for line in lines:
                  s = line.strip()
                  if not s:
                      parts.append("<div style='height:6px;'></div>")
                  elif s.startswith("STORY:"):
                      if in_story:
                          parts.append("</div>")
                      headline = s.replace("STORY:", "").strip()
                      parts.append(
                          "<div style='background:#f8f5ef;border-left:3px solid #c9a227;"
                          "padding:14px 16px;margin:16px 0 8px;'>"
                          "<p style='font-family:Georgia,serif;font-size:15px;"
                          "font-weight:bold;color:#1a1a2e;margin:0;line-height:1.5;'>"
                          + headline + "</p></div>"
                          "<div style='padding:0 4px;margin-bottom:16px;'>"
                      )
                      in_story = True
                  elif s in ["SIMPLE VERSION", "REAL-WORLD ANALOGY",
                             "WHY IT MATTERS", "WHAT THEY DID",
                             "THE PROBLEM", "THEIR APPROACH",
                             "RESULTS AND NUMBERS", "WHO BENEFITS FROM THIS",
                             "WHAT TO LEARN NEXT"] or (s.isupper() and 2 < len(s) < 60):
                      parts.append(
                          "<p style='font-family:Arial,sans-serif;font-size:9px;"
                          "font-weight:bold;color:#1a1a2e;letter-spacing:2px;"
                          "margin:14px 0 5px;text-transform:uppercase;"
                          "border-bottom:1px solid #e8e4d9;padding-bottom:4px;'>"
                          + s + "</p>"
                      )
                  elif s == "---":
                      if in_story:
                          parts.append("</div>")
                          in_story = False
                      parts.append(
                          "<table role='presentation' width='100%' cellpadding='0'"
                          " cellspacing='0' style='margin:8px 0;'><tr>"
                          "<td style='border-top:1px dashed #e8e4d9;'></td>"
                          "</tr></table>"
                      )
                  elif s.startswith("- ") or s.startswith("* "):
                      parts.append(
                          "<div style='display:flex;align-items:flex-start;margin:6px 0;'>"
                          "<span style='color:#c9a227;margin-right:10px;font-size:16px;"
                          "line-height:1.4;'>&#8226;</span>"
                          "<span style='flex:1;color:#333;font-size:13px;"
                          "line-height:1.7;font-family:Georgia,serif;'>"
                          + s[2:] + "</span></div>"
                      )
                  elif s[:2] in ["1.", "2.", "3.", "4.", "5."] and len(s) > 4:
                      parts.append(
                          "<div style='display:flex;align-items:flex-start;margin:8px 0;'>"
                          "<span style='background:#1a1a2e;color:#c9a227;"
                          "font-family:Arial,sans-serif;font-size:11px;"
                          "font-weight:bold;padding:2px 7px;margin-right:10px;"
                          "margin-top:2px;flex-shrink:0;'>"
                          + s[0] + "</span>"
                          "<span style='flex:1;color:#333;font-size:13px;"
                          "line-height:1.7;font-family:Georgia,serif;'>"
                          + s[3:] + "</span></div>"
                      )
                  else:
                      parts.append(
                          "<p style='margin:6px 0;line-height:1.8;color:#333;"
                          "font-size:13px;font-family:Georgia,serif;'>" + s + "</p>"
                      )
              if in_story:
                  parts.append("</div>")
              return "\n".join(parts)

          def build_news_card(label, color, icon, content_html):
              return (
                  "<table role='presentation' width='100%' cellpadding='0'"
                  " cellspacing='0' style='margin-top:32px;'><tr><td>"
                  "<table role='presentation' width='100%' cellpadding='0'"
                  " cellspacing='0' style='margin-bottom:16px;'><tr>"
                  "<td style='border-bottom:2px solid " + color + ";padding-bottom:8px;'>"
                  "<span style='background:" + color + ";color:#fff;"
                  "font-family:Arial,sans-serif;font-size:9px;letter-spacing:2px;"
                  "padding:5px 14px;text-transform:uppercase;font-weight:bold;'>"
                  + icon + " " + label + "</span>"
                  "</td></tr></table>"
                  "<div style='padding:0 4px;'>" + content_html + "</div>"
                  "</td></tr></table>"
              )

          def build_divider():
              return (
                  "<table role='presentation' width='100%' cellpadding='0'"
                  " cellspacing='0' style='margin:16px 0;'><tr>"
                  "<td style='border-top:1px solid #e8e4d9;'></td>"
                  "</tr></table>"
              )

          def build_full_email(date, weekday, sections_html):
              return (
                  "<!DOCTYPE html><html lang='en'>"
                  "<head><meta charset='UTF-8'>"
                  "<meta name='viewport' content='width=device-width,initial-scale=1'>"
                  "<title>The Hermes Daily</title></head>"
                  "<body style='margin:0;padding:0;background:#f0ede6;"
                  "font-family:Georgia,serif;'>"
                  "<table role='presentation' width='100%' cellpadding='0'"
                  " cellspacing='0' style='background:#f0ede6;'>"
                  "<tr><td align='center' style='padding:24px 12px;'>"
                  "<table role='presentation' style='max-width:660px;width:100%;"
                  "background:#fff;border:1px solid #d4c9b0;"
                  "box-shadow:0 2px 8px rgba(0,0,0,0.08);'>"
                  "<tr><td style='background:#1a1a2e;height:5px;'></td></tr>"
                  "<tr><td style='background:#c9a227;height:3px;'></td></tr>"
                  "<tr><td style='background:#1a1a2e;padding:32px 40px;text-align:center;'>"
                  "<p style='color:#c9a227;font-size:9px;letter-spacing:5px;"
                  "margin:0 0 10px;font-family:Arial,sans-serif;"
                  "text-transform:uppercase;font-weight:bold;'>"
                  "Your Personal Intelligence Brief</p>"
                  "<h1 style='color:#fff;font-size:44px;margin:0;"
                  "letter-spacing:4px;font-family:Georgia,serif;"
                  "font-weight:normal;line-height:1;'>THE HERMES DAILY</h1>"
                  "<p style='color:#c9a227;font-size:12px;margin:8px 0 0;"
                  "font-family:Arial,sans-serif;letter-spacing:2px;'>"
                  "MORNING EDITION</p>"
                  "<div style='border-top:1px solid #333;margin:14px 0 0;padding-top:12px;'>"
                  "<p style='color:#999;font-size:10px;margin:0;"
                  "font-family:Arial,sans-serif;letter-spacing:1px;'>"
                  + date + " &nbsp;&bull;&nbsp; " + weekday + " Morning Edition"
                  " &nbsp;&bull;&nbsp; HERMES AI</p>"
                  "</div></td></tr>"
                  "<tr><td style='background:#c9a227;height:3px;'></td></tr>"
                  "<tr><td style='background:#1a1a2e;height:1px;'></td></tr>"
                  "<tr><td style='padding:20px 40px 40px;background:#fff;'>"
                  + sections_html +
                  "</td></tr>"
                  "<tr><td style='background:#e8e4d9;height:1px;'></td></tr>"
                  "<tr><td style='background:#c9a227;height:3px;'></td></tr>"
                  "<tr><td style='background:#1a1a2e;padding:22px 40px;text-align:center;'>"
                  "<p style='color:#c9a227;font-size:11px;margin:0;"
                  "font-family:Arial,sans-serif;letter-spacing:3px;font-weight:bold;'>"
                  "The Hermes Daily</p>"
                  "<p style='color:#666;font-size:10px;margin:8px 0 0;"
                  "font-family:Arial,sans-serif;'>"
                  "Automated by GitHub Actions &bull; AI by OpenRouter &bull; "
                  "TechCrunch, VentureBeat, MIT, HackerNews, InfoQ"
                  "</p></td></tr>"
                  "<tr><td style='background:#c9a227;height:3px;'></td></tr>"
                  "</table></td></tr></table>"
                  "</body></html>"
              )

          def send_email(subject, html_body):
              try:
                  msg = MIMEMultipart("alternative")
                  msg["Subject"] = subject
                  msg["From"]    = f"Hermes Daily <{GMAIL_USER}>"
                  msg["To"]      = GMAIL_USER
                  msg.attach(MIMEText(html_body, "html"))
                  with smtplib.SMTP("smtp.gmail.com", 587) as server:
                      server.ehlo()
                      server.starttls()
                      server.login(GMAIL_USER, GMAIL_PASS)
                      server.sendmail(GMAIL_USER, GMAIL_USER, msg.as_string())
                  print("Email sent!")
              except Exception as e:
                  print(f"Email error: {e}")

          # ═════════════════════════════════════════════════════════════════
          # MAIN
          # ═════════════════════════════════════════════════════════════════

          today   = datetime.now().strftime("%d %B %Y")
          weekday = datetime.now().strftime("%A")

          send(
              f"Good Morning! - {today} ({weekday})\n\n"
              f"Hermes 8 AM Brief incoming:\n"
              f"1. AI & ML News (simple + analogy)\n"
              f"2. Hacker News (simple + analogy)\n"
              f"3. Java in AI/ML (simple + analogy)\n"
              f"4. Coding Challenges (your topic + difficulty)\n\n"
              f"Full newsletter also coming to your email!"
          )

          email_sections = []

          # ── 1. AI/ML NEWS ─────────────────────────────────────────────────

          print("Fetching AI/ML news...")
          aiml_sources = {
              "TechCrunch AI":     "https://techcrunch.com/category/artificial-intelligence/feed/",
              "VentureBeat AI":    "https://venturebeat.com/category/ai/feed/",
              "MIT Tech Review":   "https://www.technologyreview.com/feed/",
              "The Verge AI":      "https://www.theverge.com/rss/ai-artificial-intelligence/index.xml",
              "Ars Technica":      "https://feeds.arstechnica.com/arstechnica/index",
              "Hugging Face Blog": "https://huggingface.co/blog/feed.xml",
          }

          aiml_raw = ""
          for name, url in aiml_sources.items():
              chunk = fetch_rss(url, count=4)
              if chunk:
                  aiml_raw += f"\n[{name}]\n{chunk}\n"
              time.sleep(0.5)

          aiml_summary = ask_ai(build_news_prompt("AI & ML", aiml_raw))

          if aiml_summary:
              send(f"AI & ML NEWS\n{'─'*35}\n\n{aiml_summary}")
              email_sections.append(
                  build_news_card("AI & ML News", "#1a1a2e", "AI", plain_to_html(aiml_summary))
              )
              email_sections.append(build_divider())
          time.sleep(2)

          # ── 2. HACKER NEWS ────────────────────────────────────────────────

          print("Fetching Hacker News...")
          hn_raw = ""
          try:
              hn_resp = requests.get(
                  "https://hn.algolia.com/api/v1/search?tags=front_page&hitsPerPage=15",
                  timeout=15,
                  headers={"User-Agent": "HermesBot/1.0"}
              )
              hn_data = hn_resp.json()
              hn_stories = []
              for hit in hn_data.get("hits", [])[:15]:
                  title    = hit.get("title", "")
                  points   = hit.get("points", 0)
                  comments = hit.get("num_comments", 0)
                  obj_id   = hit.get("objectID", "")
                  hn_link  = f"https://news.ycombinator.com/item?id={obj_id}"
                  if title:
                      hn_stories.append(
                          f"- {title} ({points} pts, {comments} comments) {hn_link}"
                      )
              hn_raw = "\n".join(hn_stories)
              print(f"HN: {len(hn_stories)} stories fetched")
          except Exception as e:
              print(f"HN error: {e}")

          if hn_raw:
              hn_summary = ask_ai(build_news_prompt("Hacker News", hn_raw))
              if hn_summary:
                  send(f"HACKER NEWS TODAY\n{'─'*35}\n\n{hn_summary}")
                  email_sections.append(
                      build_news_card("Hacker News", "#ff6600", "HN", plain_to_html(hn_summary))
                  )
                  email_sections.append(build_divider())
          time.sleep(2)

          # ── 3. JAVA IN AI/ML ──────────────────────────────────────────────

          print("Fetching Java news...")
          java_sources = {
              "InfoQ Java":  "https://feed.infoq.com/java",
              "InfoQ AI/ML": "https://feed.infoq.com/ai-ml-data-eng",
              "Baeldung":    "https://www.baeldung.com/feed/",
              "Inside Java": "https://inside.java/feed.xml",
              "DZone Java":  "https://feeds.dzone.com/java",
          }

          java_raw = ""
          for name, url in java_sources.items():
              chunk = fetch_rss(url, count=4)
              if chunk:
                  java_raw += f"\n[{name}]\n{chunk}\n"
              time.sleep(0.5)

          java_summary = ask_ai(build_news_prompt("Java in AI/ML", java_raw))

          if java_summary:
              send(f"JAVA IN AI & ML\n{'─'*35}\n\n{java_summary}")
              email_sections.append(
                  build_news_card("Java in AI & ML", "#e76f00", "J", plain_to_html(java_summary))
              )
          time.sleep(2)

          # ── 4. CODING CHALLENGES (Telegram only) ──────────────────────────

          print("Generating coding challenges...")
          learning_topic, difficulty = get_learning_topic()

          diff_instructions = {
              "Easy": (
                  "The student is a complete beginner. Keep challenges very simple.\n"
                  "EASY: A 5-line script, basic syntax only.\n"
                  "MEDIUM: 10-15 lines, one concept at a time.\n"
                  "HARD: 20 lines max, one real-world mini-problem."
              ),
              "Medium": (
                  "The student knows the basics. Make challenges practical.\n"
                  "EASY: Quick warmup, directly tests the topic.\n"
                  "MEDIUM: Combines topic with one other concept.\n"
                  "HARD: A real-world mini-project using the topic."
              ),
              "Hard": (
                  "The student is comfortable with the topic. Push them.\n"
                  "EASY: Something they should solve in under 5 minutes.\n"
                  "MEDIUM: Requires thinking about edge cases.\n"
                  "HARD: Production-level problem, optimization required."
              ),
          }

          diff_guide = diff_instructions.get(difficulty, diff_instructions["Medium"])

          if learning_topic:
              challenge_prompt = (
                  f"Generate 3 coding challenges on this topic: {learning_topic}\n"
                  f"Difficulty level chosen by student: {difficulty}\n\n"
                  f"{diff_guide}\n\n"
                  f"Use EXACTLY this format:\n\n"
                  f"YOUR TOPIC: {learning_topic}\n"
                  f"DIFFICULTY: {difficulty}\n\n"
                  f"EASY\n"
                  f"Task: [challenge]\n"
                  f"What to use: [specific method or concept from {learning_topic}]\n"
                  f"Expected output:\n"
                  f"[show exact output]\n\n"
                  f"MEDIUM\n"
                  f"Task: [challenge]\n"
                  f"What to use: [specific tools]\n"
                  f"Expected output:\n"
                  f"[show exact output]\n\n"
                  f"HARD\n"
                  f"Task: [challenge]\n"
                  f"Hint: [one-line hint]\n"
                  f"Expected output:\n"
                  f"[show exact output]\n\n"
                  f"BONUS QUESTION\n"
                  f"Task: [one conceptual question that tests deep understanding]\n"
                  f"Answer: [short answer]\n\n"
                  f"Keep all challenges in Python unless topic is specifically Java."
              )
          else:
              challenge_prompt = (
                  "Generate 3 Python beginner challenges on fundamentals.\n\n"
                  "Note at top: Add a line to learning_log.txt like:\n"
                  "2026-05-14: Your topic here | Easy\n"
                  "to get personalized challenges!\n\n"
                  "EASY\nTask: [challenge]\nExpected output: [output]\n\n"
                  "MEDIUM\nTask: [challenge]\nExpected output: [output]\n\n"
                  "HARD\nTask: [challenge]\nHint: [hint]\nExpected output: [output]"
              )

          challenge = ask_ai(challenge_prompt)
          topic_label = f"{learning_topic} ({difficulty})" if learning_topic else "Python Fundamentals"

          if challenge:
              send(
                  f"DAILY CODING CHALLENGES\n{'─'*35}\n\n"
                  f"Topic: {topic_label}\n\n"
                  f"{challenge}\n\n"
                  f"─────\n"
                  f"To change topic/difficulty: edit learning_log.txt\n"
                  f"Format: 2026-05-14: your topic | Easy/Medium/Hard"
              )

          # ── Build and send email ───────────────────────────────────────────

          if email_sections:
              print("Building email...")
              html = build_full_email(today, weekday, "".join(email_sections))
              send_email(f"The Hermes Daily - {today} Morning Brief", html)

          send(
              f"Done! Your 8 AM brief is complete.\n\n"
              f"Full newsletter sent to your email.\n"
              f"Research papers from 6:30 AM are also in your inbox.\n"
              f"Have a productive day!"
          )

          print("Morning brief complete!")
          PYEOF

      - name: Run Morning Brief
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          OPENROUTER_KEY: ${{ secrets.OPENROUTER_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python morning.py
